services:
  app:
    build: .
    container_name: app
    volumes:
      - .:/var/www
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"  # management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - app-network
  worker:
    build: .
    container_name: worker
    command: >
      sh -c "
        php artisan queue:work rabbitmq --queue=high,low --sleep=3 --tries=3
      "
    volumes:
      - .:/var/www
    depends_on:
      - app
      - rabbitmq
      - redis
      - postgres
    networks:
      - app-network
    restart: unless-stopped
    environment:
      - APP_ENV=local


networks:
  app-network:

volumes:
  postgres_data: